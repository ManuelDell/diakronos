<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diakonos</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {%- for css in css_files %}
    <link rel="stylesheet" href="/assets/diakronos/frontend/{{ css }}">
    {%- endfor %}
</head>
<body>
    <div id="app"></div>

    <script>
        window.__DIakonosBOOT = {
            user_fullname: {{ user_fullname | tojson }},
            user_email:    {{ user_email | tojson }},
            user_image:    {{ user_image | tojson }},
            csrf_token:    {{ csrf_token | tojson }},
            is_admin:      {{ is_admin | tojson }},
            mitglied:      {{ (mitglied or {}) | tojson }},
            modules:       {{ (modules or []) | tojson }},
        };
    </script>
    {%- if js_file %}
    <script type="module" src="/assets/diakronos/frontend/{{ js_file }}"></script>
    {%- else %}
    <script type="module" src="/assets/diakronos/frontend/diakonos.js"></script>
    {%- endif %}
</body>
</html>

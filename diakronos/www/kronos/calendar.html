<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ kronos_css }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body data-user-initial="{{ user_initial }}" data-user-fullname="{{ user_fullname }}">

    {% if not is_logged_in %}
    <div class="login-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="background: white; padding: 20px; border-radius: 8px; text-align: center;">
            <p>Sie müssen angemeldet sein, um Kronos zu nutzen.</p>
            <a href="/login" style="color: blue;">Zum Login</a>
        </div>
    </div>
    {% endif %}

    <div class="kronos-app-container">
        <!-- HEADER -->
        <header class="kronos-header"></header>

        <!-- MAIN CONTENT: Sidebar + Calendar -->
        <main class="kronos-main-content">
            <!-- Sidebar -->
            <button class="kronos-fab" aria-label="Neuen Termin erstellen">
                <span class="fab-icon">+</span>
                <span class="fab-text">Neuer Termin</span>
            </button>
            <aside class="kronos-sidebar" aria-label="Calendar Navigation">
                <div class="sidebar-section sidebar-placeholder"></div>
                <div class="sidebar-section sidebar-calendar">
                    <div id="mini-kalender"></div>
                </div>
                <div class="sidebar-section sidebar-calenderlist-section">
                    <h3 class="sidebar-title">Meine Kalender</h3>
                    <div id="calendar-list" class="sidebar-calenderlist"></div>
                </div>
            </aside>

            <!-- Kalender -->
            <div id="calendar" class="kronos-calendar"></div>
        </main>
    </div>
</body>

    <!-- Bibliotheken -->
    <script src="/assets/diakronos/js/lib/moment/moment.min.js"></script>
    <script src="/assets/diakronos/js/lib/moment/moment-timezone-with-data-10-year-range.min.js"></script>
    <script src="/assets/diakronos/js/lib/fullcalendar/index.global.min.js"></script>

    <!-- Dein Bundle -->
    <script type="module" src="{{ kronos_js }}"></script>
</body>
</html>

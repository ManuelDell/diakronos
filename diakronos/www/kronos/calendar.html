<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ kronos_css }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body data-user-initial="{{ user_initial }}" data-user-fullname="{{ user_fullname }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <!-- Nur das Nötigste für frappe.call + session -->

    {% if not is_logged_in %}
    <div class="login-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; color: white; font-family: sans-serif;">
        <div style="background: white; color: black; padding: 32px; border-radius: 12px; text-align: center; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <h2 style="margin: 0 0 16px;">Willkommen bei Kronos</h2>
            <p style="margin: 0 0 24px; font-size: 1.1rem;">Um den Kalender zu nutzen, musst du dich anmelden.</p>
            <a href="/login?redirect-to=/kronos/calendar"
            style="display: inline-block; padding: 12px 32px; background: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 500;">
                Jetzt anmelden
            </a>
        </div>
    </div>
    {% endif %} 
    
    <div class="kronos-app-container">
        <!-- HEADER -->
        <!-- HEADER – genau wie gewünscht: Logo + Hamburger links | Pfeile + Monat mittig | View-Dropdown + Profil rechts -->
    <header class="kronos-header">
        <body data-user-initial="{{ user_initial }}" data-user-fullname="{{ user_fullname }}">
    </header>

        <!-- MAIN CONTENT: Sidebar + Calendar -->
        <main class="kronos-main-content">
            <!-- Sidebar -->
             <button class="kronos-fab" aria-label="Neuen Termin erstellen">
                <span class="fab-icon">+</span>
                <span class="fab-text">Neuer Termin</span>
            </button>   
            <aside class="kronos-sidebar" aria-label="Calendar Navigation">
                <div class="sidebar-section"></div>
                <div class="sidebar-section">
                    <div id="mini-kalender"></div>
                </div>
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Meine Kalender</h3>
                    <div id="calendar-list"></div>
                    <button class="add-calendar-btn">+ Kalender hinzufügen</button>
                </div>
                <div class="sidebar-section">
                    <button class="sidebar-settings-btn">Einstellungen</button>
                </div>
            </aside>

            <!-- Kalender -->
            <div id="calendar" class="kronos-calendar"></div>
        </main>
    </div>

    <!-- Bibliotheken -->
    <script src="/assets/diakronos/js/lib/moment/moment.min.js"></script>
    <script src="/assets/diakronos/js/lib/moment/moment-timezone-with-data-10-year-range.min.js"></script>
    <script src="/assets/diakronos/js/lib/fullcalendar/index.global.min.js"></script>

    <!-- Dein Bundle -->
    <script type="module" src="{{ kronos_js }}"></script>


    <!-- Init (später in JS auslagern) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Kronos Portal geladen');

            if (window.FullCalendar) {
                const calendarEl = document.getElementById('calendar');
                const calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    events: [
                        { title: 'Testtermin', start: '2026-01-30' }
                    ],
                    headerToolbar: false
                });
                calendar.render();
                console.log('FullCalendar initialisiert');
            } else {
                console.warn('FullCalendar nicht verfügbar');
            }
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.header_build_elements) {
                window.header_build_elements();
            }
        });
    </script>  
</body>
</html>

{% extends "templates/web.html" %}

{% block page_content %}
<style>
    /* WICHTIG: Diese Styles überschreiben Frappe defaults */

    /* Entferne Frappe Container Beschränkungen */
    .page-container {
        max-width: none !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    .container {
        max-width: none !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    main {
        padding: 0 !important;
        margin: 0 !important;
    }

    .website-content {
        padding: 0 !important;
        margin: 0 !important;
    }

    /* Basis Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
    }

    html,
    body,
    #page-kronos-web {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #ffffff;
        color: #000000;
    }

    /* Kronos App - Vollbild */
    #kronos-app {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
    }

    .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: white;
        border-bottom: 1px solid #e0e0e0;
        flex-shrink: 0;
        z-index: 100;
        height: 80px;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .app-header h1 {
        margin: 0;
        color: #000000;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .view-switcher {
        display: flex;
        gap: 8px;
    }

    .view-switcher button {
        padding: 10px 18px;
        border-radius: 6px;
        border: 1px solid #d0d0d0;
        background: white;
        color: #333333;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
    }

    .view-switcher button:hover {
        background: #f5f5f5;
        border-color: #999999;
    }

    .view-switcher button.active {
        background: #007bff;
        color: white;
        border-color: #007bff;
    }

    /* Kalender Container - VOLLBILD */
    .calendar-wrapper {
        flex: 1;
        overflow: hidden;
        background: white;
        width: 100%;
        height: calc(100vh - 80px);
        position: relative;
    }

    #calendar {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
    }

    .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        font-size: 16px;
        color: #666666;
    }

    .loading::after {
        content: '';
        display: inline-block;
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #007bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    /* TUI-Calendar Overrides */
    .toastui-calendar-month-event,
    .toastui-calendar-month-event-title,
    .toastui-calendar-time-event,
    .toastui-calendar-allday-event {
        color: #000000 !important;
    }

    /* Verstecke Frappe Footer */
    footer,
    .website-footer,
    .footer-section {
        display: none !important;
    }
</style>

<div id="kronos-app">
    <header class="app-header">
        <div class="header-left">
            <h1>📅 Kronos Kalender</h1>
        </div>
        <nav class="view-switcher">
            <button id="month-view" class="btn active" title="Monatsansicht">Monat</button>
            <button id="week-view" class="btn" title="Wochenansicht">Woche</button>
            <button id="day-view" class="btn" title="Tagesansicht">Tag</button>
            <button id="task-view" class="btn" title="Aufgabenliste">Aufgaben</button>
        </nav>
    </header>
    <div class="calendar-wrapper">
        <div id="calendar" class="loading">Kalender wird geladen...</div>
    </div>
</div>

<!-- TOAST UI Calendar v2.1.3 -->
<link rel="stylesheet" href="https://unpkg.com/@toast-ui/calendar@2.1.3/dist/toastui-calendar.min.css">
<script src="https://unpkg.com/@toast-ui/calendar@2.1.3/dist/toastui-calendar.min.js"></script>

{% endblock %}

{% block script %}
<script>
    class KronosApp {
        constructor() {
            this.calendar = null;
            this.currentDate = new Date();
            this.visibleCalendars = [];
            this.init();
        }

        async init() {
            const calendarEl = document.getElementById('calendar');
            if (!calendarEl) {
                console.error('❌ Kalender-Container nicht gefunden');
                return;
            }

            try {
                console.log('🔍 Prüfe Prerequisites...');
                console.log('  - frappe:', typeof frappe);
                console.log('  - tui.Calendar:', typeof tui?.Calendar);

                if (typeof frappe === 'undefined') {
                    throw new Error('Frappe nicht verfügbar!');
                }

                if (typeof tui === 'undefined' || typeof tui.Calendar === 'undefined') {
                    throw new Error('TOAST UI Calendar nicht geladen!');
                }

                calendarEl.classList.remove('loading');
                calendarEl.innerHTML = '';

                this.calendar = new tui.Calendar(calendarEl, {
                    defaultView: 'month',
                    useCreationPopup: true,
                    useDetailPopup: true,
                    taskView: true,
                    scheduleView: ['time', 'allday'],
                    timezone: 'Europe/Berlin',
                    isReadOnly: false,
                    week: {
                        hourStart: 6,
                        hourEnd: 23,
                    },
                    month: {
                        startDayOfWeek: 1,
                        narrowWeekend: false,
                    },
                    template: {
                        monthDayname: (d) => ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'][d.day]
                    }
                });

                console.log('✅ Kronos Kalender initialisiert');

                this.setupViewButtons();
                console.log('🚀 Lade Events...');
                await this.loadEvents();

            } catch (error) {
                console.error('❌ Fehler:', error);
                calendarEl.innerHTML = `<div style="padding: 20px; color: red;">❌ ${error.message}</div>`;
            }
        }

        setupViewButtons() {
            const buttons = document.querySelectorAll('.view-switcher button');
            const updateActiveButton = (btn) => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };

            document.getElementById('month-view').addEventListener('click', () => {
                this.calendar.changeView('month');
                updateActiveButton(document.getElementById('month-view'));
            });

            document.getElementById('week-view').addEventListener('click', () => {
                this.calendar.changeView('week');
                updateActiveButton(document.getElementById('week-view'));
            });

            document.getElementById('day-view').addEventListener('click', () => {
                this.calendar.changeView('day');
                updateActiveButton(document.getElementById('day-view'));
            });

            document.getElementById('task-view').addEventListener('click', () => {
                this.calendar.changeView('task');
                updateActiveButton(document.getElementById('task-view'));
            });
        }

        async loadEvents() {
            const startDate = this.getMonthStart();
            const endDate = this.getMonthEnd();

            return new Promise((resolve, reject) => {
                frappe.call({
                    method: 'diakronos.kronos.kronos_core.get_calendar_events',
                    args: {
                        start_date: this.formatDate(startDate),
                        end_date: this.formatDate(endDate),
                        calendar_filter: JSON.stringify(this.visibleCalendars)
                    },
                    callback: (response) => {
                        try {
                            if (response.message && Array.isArray(response.message)) {
                                console.log(`✅ ${response.message.length} Events geladen`);

                                this.calendar.clear();

                                const events = response.message.map((e) => {
                                    let start, end;

                                    try {
                                        start = new Date(e.start);
                                        end = new Date(e.end);
                                    } catch (err) {
                                        console.warn(`⚠️ Date parse error for ${e.title}`);
                                        return null;
                                    }

                                    if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                                        return null;
                                    }

                                    const event = {
                                        id: e.id,
                                        title: e.title || 'Untitled',
                                        start: start,
                                        end: end,
                                        isAllday: e.isAllday || false,
                                        backgroundColor: e.color || '#007bff',
                                        borderColor: e.color || '#007bff',
                                        color: '#000000',
                                        category: e.isAllday ? 'allday' : 'time'
                                    };

                                    return event;
                                }).filter(e => e !== null);

                                if (events.length > 0) {
                                    this.calendar.createEvents(events);
                                    console.log(`🎨 ${events.length} Events angezeigt`);
                                }
                            }
                            resolve();
                        } catch (err) {
                            console.error('❌ Parse-Fehler:', err);
                            reject(err);
                        }
                    },
                    error: (err) => {
                        console.error('❌ API-Fehler:', err);
                        reject(err);
                    }
                });
            });
        }

        getMonthStart() {
            const d = new Date(this.currentDate);
            d.setDate(1);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        getMonthEnd() {
            const d = new Date(this.currentDate);
            d.setMonth(d.getMonth() + 1);
            d.setDate(0);
            d.setHours(23, 59, 59, 999);
            return d;
        }

        formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        console.log('🎯 Starte Kronos App');
        window.kronosApp = new KronosApp();
    });
</script>
{% endblock %}

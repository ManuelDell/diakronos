{% extends "templates/web.html" %}

{% block title %}Kronos Kalender{% endblock %}

{% block style %}
<!-- ZUERST: Frappe verstecken -->
<style>
  body > .frappe-control { display: none !important; }
  .sidebar-menu { display: none !important; }
  .navbar { display: none !important; }
  html, body { margin: 0; padding: 0; overflow: hidden; }
</style>

<link rel="stylesheet" href="/assets/diakronos/css/design_tokens_variables.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_base_reset.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_typography_styles.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_component_button.css?v=1.0.2">
<link rel="stylesheet" href="/assets/diakronos/css/design_component_form.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_component_card.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_component_layout.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_component_accessibility.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_theme_darkmode.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/design_fonts_loader.css?v=1.0.0">
<link rel="stylesheet" href="/assets/diakronos/css/kronos_web.css?v=1.0.33">
{% endblock %}

{% block page_content %}
<div id="wrapper">
    <!-- HEADER BLOCK - über allem -->
    <header class="app-header">
        <div class="header-left">
            <button id="back-button" class="back-btn" title="Zurück">←</button>
            <button id="menu-toggle" class="back-btn" title="Menu">☰</button>
            <h1 id="greeting-title">📅 Kronos</h1>
        </div>
        
        <div class="month-nav-header">
            <button id="prev-month" class="nav-btn-header" title="Vorheriger Monat">◀</button>
            <div id="current-month-header" class="current-month-header">Januar 2026</div>
            <button id="next-month" class="nav-btn-header" title="Nächster Monat">▶</button>
            <button id="today-button" class="today-btn">Heute</button>
        </div>
        
        <nav class="view-switcher">
            <button id="month-view" class="btn active">Monat</button>
            <button id="week-view" class="btn">Woche</button>
        </nav>
    </header>

    <!-- CONTENT BLOCK - Grid mit Sidebar + Kalender als GESCHWISTER -->
    <div id="page-content-wrapper">
        
        <!-- SIDEBAR - 1. Grid-Spalte (versteckt bei grid-template-columns: 0 1fr) -->
        <div id="sidebar-wrapper">
            <div class="sidebar-nav-header">
                <button id="back-button-sidebar" class="back-btn" title="Zurück">←</button>
            </div>
            
            <ul class="sidebar-nav" id="sidebar-nav">
                <li><a href="#">📋 About</a></li>
                <li><a href="#">📧 Contact</a></li>
            </ul>
            
            <!-- 🎯 DARK MODE TOGGLE - UNTEN IN SIDEBAR -->
            <div class="sidebar-darkmode">
                <input type="checkbox" id="darkmode-checkbox" class="hidden" />
                <label for="darkmode-checkbox" class="darkmode-toggle">
                    <div class="darkmode-circle">
                        <div class="darkmode-star star-1"></div>
                        <div class="darkmode-star star-2"></div>
                        <div class="darkmode-star star-3"></div>
                    </div>
                </label>
                <div class="darkmode-label">
                    <span class="darkmode-label-title">Design</span>
                    <span class="darkmode-label-description">Dunkel/Hell</span>
                </div>
            </div>
        </div>


        <!-- KALENDER - 2. Grid-Spalte (füllt verfügbaren Platz) -->
        <div id="kronos-app">
            <div class="calendar-wrapper">
                <div id="calendar"></div>
            </div>
        </div>

    </div>

</div>
{% endblock %}

{% block script %}
<!-- 🎯 FRAPPE VERSTECKEN - SPÄTER APPROACH -->
<script>
// NICHT sofort ausführen - warten bis alles geladen ist
window.addEventListener('load', function() {
    'use strict';
    
    // Jetzt DARF Frappe Template existieren
    const frappeUI = document.querySelector('.frappe-control');
    const sidebar = document.querySelector('.sidebar-menu');
    const navbar = document.querySelector('.navbar');
    
    if (frappeUI) frappeUI.style.display = 'none';
    if (sidebar) sidebar.style.display = 'none';
    if (navbar) navbar.style.display = 'none';
    
    console.log('✅ Frappe UI versteckt');
});
</script>

<!-- FullCalendar -->
<script src="/assets/diakronos/js/fullcalendar.min.js?v=6.1.16"></script>

<!-- 🔧 KRONOS MODAL MODULES (in dieser Reihenfolge laden!) -->

<!-- 🎯 SIDEBAR MODULE -->

<!-- Hauptapplication -->

<!-- 🎯 SMOOTH RESIZE ANIMATIONS -->
<!--<script src="/assets/diakronos/js/kronos_smooth_resize.js?v=1.0.3"></script>-->

<!-- 🌙 DARK MODE SCRIPT -->
<script>
(function() {
    'use strict';
    
    const darkmodeCheckbox = document.getElementById('darkmode-checkbox');
    
    function initDarkMode() {
        const saved = localStorage.getItem('kronos-darkmode');
        const prefersLight = !window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = saved ? saved === 'true' : !prefersLight;
        
        if (isDark) {
            enableDarkMode();
        } else {
            disableDarkMode();
        }
    }
    
    function enableDarkMode() {
        document.documentElement.setAttribute('data-color-scheme', 'dark');
        localStorage.setItem('kronos-darkmode', 'true');
        if (darkmodeCheckbox) darkmodeCheckbox.checked = true;
    }
    
    function disableDarkMode() {
        document.documentElement.setAttribute('data-color-scheme', 'light');
        localStorage.setItem('kronos-darkmode', 'false');
        if (darkmodeCheckbox) darkmodeCheckbox.checked = false;
    }
    
    if (darkmodeCheckbox) {
        darkmodeCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                enableDarkMode();
            } else {
                disableDarkMode();
            }
        });
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDarkMode);
    } else {
        initDarkMode();
    }
})();
</script>
{% endblock %}

{% extends "templates/web.html" %}

{% block title %}Kronos Kalender{% endblock %}

{% block style %}
<link rel="stylesheet" href="/assets/diakronos/css/kronos_web.css?v=1.0.06">
{% endblock %}

{% block page_content %}
<div id="kronos-app">
    <header class="app-header">
        <div class="header-left">
            <button id="back-button" class="back-btn" title="Zurück">←</button>
            <h1 id="greeting-title">📅 Kronos</h1>
        </div>
        
        <div class="month-nav-header">
            <button id="prev-month" class="nav-btn-header" title="Vorheriger Monat">◀</button>
            <div id="current-month-header" class="current-month-header">Januar 2026</div>
            <button id="next-month" class="nav-btn-header" title="Nächster Monat">▶</button>
            <button id="today-button" class="today-btn">Heute</button>
        </div>
        
        <nav class="view-switcher">
            <button id="month-view" class="btn active">Monat</button>
            <button id="week-view" class="btn">Woche</button>
        </nav>
    </header>
    
    <div class="calendar-wrapper">
        <div id="calendar"></div>
    </div>
</div>
{% endblock %}

{% block script %}
<script src="/assets/diakronos/js/fullcalendar.min.js?v=6.1.16"></script>

<!-- 🔧 KRONOS MODAL MODULES (in dieser Reihenfolge laden!) -->
<script src="/assets/diakronos/js/modules/modal_helpers.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_base.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_event_click.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_smart_edit.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_series_handler.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_create_dialog.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/kronos_modal.js?v=1.0.1"></script>

<!-- Hauptapplication -->
<script src="/assets/diakronos/js/kronos_web.js?v=1.0.64"></script>
{% endblock %}

{% extends "templates/web.html" %}



{% block title %}Kronos Kalender{% endblock %}



{% block style %}
<link rel="stylesheet" href="/assets/diakronos/css/kronos_web.css?v=1.0.23">
{% endblock %}



{% block page_content %}
<div id="wrapper">
    <!-- HEADER BLOCK - über allem -->
    <header class="app-header">
        <div class="header-left">
            <button id="back-button" class="back-btn" title="Zurück">←</button>
            <button id="menu-toggle" class="back-btn" title="Menu">☰</button>
            <h1 id="greeting-title">📅 Kronos</h1>
        </div>
        
        <div class="month-nav-header">
            <button id="prev-month" class="nav-btn-header" title="Vorheriger Monat">◀</button>
            <div id="current-month-header" class="current-month-header">Januar 2026</div>
            <button id="next-month" class="nav-btn-header" title="Nächster Monat">▶</button>
            <button id="today-button" class="today-btn">Heute</button>
        </div>
        
        <nav class="view-switcher">
            <button id="month-view" class="btn active">Monat</button>
            <button id="week-view" class="btn">Woche</button>
        </nav>
    </header>



    <!-- CONTENT BLOCK - Grid mit Sidebar + Kalender als GESCHWISTER -->
    <div id="page-content-wrapper">
        
        <!-- SIDEBAR - 1. Grid-Spalte (versteckt bei grid-template-columns: 0 1fr) -->
        <div id="sidebar-wrapper">
            <ul class="sidebar-nav">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            
            <!-- 🎯 DARK MODE TOGGLE - UNTEN IN SIDEBAR -->
            <div class="sidebar-footer">
                <button id="darkmode-toggle" class="darkmode-btn" title="Dunkelmodus">
                    <span class="darkmode-icon">🌙</span>
                    <span class="darkmode-label">Dunkelmodus</span>
                </button>
            </div>
        </div>



        <!-- KALENDER - 2. Grid-Spalte (füllt verfügbaren Platz) -->
        <div id="kronos-app">
            <div class="calendar-wrapper">
                <div id="calendar"></div>
            </div>
        </div>


    </div>



</div>
{% endblock %}



{% block script %}
<script src="/assets/diakronos/js/fullcalendar.min.js?v=6.1.16"></script>



<!-- 🔧 KRONOS MODAL MODULES (in dieser Reihenfolge laden!) -->
<script src="/assets/diakronos/js/modules/modal_helpers.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_base.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_event_click.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_smart_edit.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_series_handler.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/modal_create_dialog.js?v=1.0.1"></script>
<script src="/assets/diakronos/js/modules/kronos_modal.js?v=1.0.1"></script>



<!-- Hauptapplication -->
<script src="/assets/diakronos/js/kronos_web.js?v=1.0.67"></script>


<!-- 🎯 SMOOTH RESIZE ANIMATIONS für FullCalendar v6.1.16 -->
<script src="/assets/diakronos/js/kronos_smooth_resize.js?v=1.0.1"></script>

<!-- 🌙 DARK MODE SCRIPT -->
<script>
(function() {
    'use strict';
    
    const darkModeBtn = document.getElementById('darkmode-toggle');
    const darkModeIcon = darkModeBtn?.querySelector('.darkmode-icon');
    
    // ✅ Lade gespeicherte Preference
    function initDarkMode() {
        const saved = localStorage.getItem('kronos-darkmode');
        const prefersLight = !window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = saved ? saved === 'true' : !prefersLight;
        
        if (isDark) {
            enableDarkMode();
        } else {
            disableDarkMode();
        }
    }
    
    // ✅ Dark Mode aktivieren
    function enableDarkMode() {
        document.documentElement.setAttribute('data-color-scheme', 'dark');
        localStorage.setItem('kronos-darkmode', 'true');
        if (darkModeIcon) darkModeIcon.textContent = '☀️';
        if (darkModeBtn) darkModeBtn.classList.add('active');
        console.log('🌙 Dark Mode aktiviert');
    }
    
    // ✅ Dark Mode deaktivieren
    function disableDarkMode() {
        document.documentElement.setAttribute('data-color-scheme', 'light');
        localStorage.setItem('kronos-darkmode', 'false');
        if (darkModeIcon) darkModeIcon.textContent = '🌙';
        if (darkModeBtn) darkModeBtn.classList.remove('active');
        console.log('☀️ Light Mode aktiviert');
    }
    
    // ✅ Toggle Handler
    if (darkModeBtn) {
        darkModeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isDark = document.documentElement.getAttribute('data-color-scheme') === 'dark';
            if (isDark) {
                disableDarkMode();
            } else {
                enableDarkMode();
            }
        });
    }
    
    // ✅ Initialisiere beim Load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDarkMode);
    } else {
        initDarkMode();
    }
})();
</script>
{% endblock %}
